<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammadyusuf | Link Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-container">
        <div class="profile">
            <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=200&h=200&auto=format&fit=crop" alt="Avatar">
            <h1>Muhammadyusuf</h1>
            <p>Videograph & Photographer</p>
        </div>

        <div class="links" id="links-container">
            <!-- Dynamic links load here -->
        </div>

        <div class="footer">
            Shaxsiy Link Hub &copy; <span id="year"></span>
        </div>
    </div>

    <!-- For demo purposes, we use a simple script that acts like the compiled TS -->
    <script type="module">
        import { formatCount, getStorageItem, setStorageItem } from './src/utils.js';

        const links = [
            { id: 'tg', name: 'Telegram', url: 'https://t.me/your_username', shape: 'shape-1', color: '#0088cc', icon: 'fab fa-telegram-plane' },
            { id: 'ins', name: 'Instagram', url: 'https://instagram.com/your_username', shape: 'shape-2', color: '#e1306c', icon: 'fab fa-instagram' },
            { id: 'yt', name: 'YouTube', url: 'https://youtube.com/@your_channel', shape: 'shape-3', color: '#ff0000', icon: 'fab fa-youtube' },
            { id: 'fb', name: 'Facebook', url: 'https://facebook.com/your_profile', shape: 'shape-4', color: '#1877f2', icon: 'fab fa-facebook-f' }
        ];

        const container = document.getElementById('links-container');
        document.getElementById('year').textContent = new Date().getFullYear();

        function updateUI() {
            container.innerHTML = '';
            links.forEach(link => {
                const count = getStorageItem('count_' + link.id);
                const a = document.createElement('a');
                a.href = link.url;
                a.target = "_blank";
                a.className = `link-item ${link.shape}`;
                a.innerHTML = `
                    <div class="link-content">
                        <i class="${link.icon}" style="color:${link.color}"></i>
                        <span>${link.name}</span>
                    </div>
                    <span class="click-count">${formatCount(count)}</span>
                `;
                a.onclick = () => {
                    const newCount = parseInt(getStorageItem('count_' + link.id)) + 1;
                    setStorageItem('count_' + link.id, newCount);
                    updateUI();
                };
                container.appendChild(a);
            });
        }

        updateUI();
    </script>
</body>
</html>
