<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammadyusuf | Link Hub</title>
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none !important;
        }

        body {
            /* Creamy Background */
            background: linear-gradient(135deg, #fff5e6 0%, #f7e8d0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Neon Elements */
        .neon-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.5;
            animation: move 15s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: #ff007f; top: 10%; left: 10%; }
        .orb-2 { width: 400px; height: 400px; background: #00e5ff; bottom: 10%; right: 10%; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        /* Custom Neon Cursor */
        #cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid transparent;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff007f, #00e5ff) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 5px #ff007f) drop-shadow(0 0 5px #00e5ff);
            transition: width 0.15s, height 0.15s;
        }
        .cursor-hover { width: 50px !important; height: 50px !important; }

        /* Glassmorphism Card */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 40px 25px;
            width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Profile Section */
        .profile img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
            margin-bottom: 15px;
        }

        .profile h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .profile p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Link Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            text-decoration: none;
            color: #444;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.8);
            color: #000;
            border-color: #00e5ff;
        }

        /* Asymmetric Shapes */
        .shape-tg { border-radius: 30px 5px 30px 15px; }
        .shape-ig { border-radius: 10px 40px 15px 30px; }
        .shape-yt { border-radius: 50px 20px 50px 20px; }
        .shape-fb { border-radius: 15px 15px 40px 40px; }

        /* Counter Badge */
        .count-badge {
            font-size: 11px;
            background: #333;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="neon-orb orb-1"></div>
    <div class="neon-orb orb-2"></div>

    <div class="glass-container card">
        <div class="profile">
            <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=200&h=200&auto=format&fit=crop" alt="Avatar">
            <h1>Muhammadyusuf Karimjonov</h1>
            <p>Videograph, photograph</p>
        </div>

        <div class="links-container">
            <a href="https://t.me/your_username" target="_blank" class="link-item shape-tg" onclick="count('tg')">
                <span>✈️ Telegram</span>
                <span class="count-badge" id="count-tg">0</span>
            </a>
            <a href="https://instagram.com/your_username" target="_blank" class="link-item shape-ig" onclick="count('ig')">
                <span>📸 Instagram</span>
                <span class="count-badge" id="count-ig">0</span>
            </a>
            <a href="https://youtube.com/@your_channel" target="_blank" class="link-item shape-yt" onclick="count('yt')">
                <span>▶️ YouTube</span>
                <span class="count-badge" id="count-yt">0</span>
            </a>
            <a href="https://facebook.com/your_profile" target="_blank" class="link-item shape-fb" onclick="count('fb')">
                <span>👥 Facebook</span>
                <span class="count-badge" id="count-fb">0</span>
            </a>
        </div>
    </div>

    <script>
        // Cursor logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Hover effect for cursor
        document.querySelectorAll('a').forEach(btn => {
            btn.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
            btn.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
        });

        // Click counter logic
        function count(id) {
            let val = parseInt(localStorage.getItem('click_' + id) || 0) + 1;
            localStorage.setItem('click_' + id, val);
            updateUI();
        }

        function updateUI() {
            const ids = ['tg', 'ig', 'yt', 'fb'];
            ids.forEach(id => {
                const val = localStorage.getItem('count_' + id) || 0;
                document.getElementById('count-' + id).innerText = localStorage.getItem('click_' + id) || 0;
            });
        }

        // Initialize UI
        updateUI();
    </script>
</body>
</html>
